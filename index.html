<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDP-Symbiosis ML Slides</title>
    <style>
        /* Full screen reset */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000; font-family: sans-serif;
        }

        /* The Slide Frame */
        #viewer { 
            width: 100vw; height: 100vh; border: none; display: block;
        }

        /* Overlay Controls */
        .controls-wrapper {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            opacity: 0.1; /* Dimmed by default */
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* Reveal on hover */
        .controls-wrapper:hover {
            opacity: 1;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        button { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(30, 30, 30, 0.9); 
            color: white; 
            font-weight: bold;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        button:hover { background: #444; }

        .counter { 
            color: #fff; 
            font-size: 11px; 
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <iframe id="viewer" src=""></iframe>

    <div class="controls-wrapper">
        <div class="counter" id="counter">00 / 00</div>
        <div class="btn-group">
            <button onclick="prevSlide()">Prev</button>
            <button onclick="nextSlide()">Next</button>
        </div>
    </div>

    <script>
        // LIST YOUR FILES HERE
        // Since we are on a static site, we define the files manually
        const slides = [
            "slides/slide001.html", "slides/slide002.html", "slides/slide003.html", "slides/slide003-SECTION01.html", 
            "slides/slide004.html",
            "slides/slide005.html", "slides/slide006.html", "slides/slide007.html", "slides/slide008.html",
            "slides/slide009.html", "slides/slide010.html", "slides/slide011.html", "slides/slide012.html",
            "slides/slide013.html", "slides/slide014.html"
        ];

        let currentIndex = 0;
        const viewer = document.getElementById('viewer');
        const counter = document.getElementById('counter');

        function updateSlide() {
            viewer.src = slides[currentIndex];
            
            // UI Updates
            const current = (currentIndex + 1).toString().padStart(2, '0');
            const total = slides.length.toString().padStart(2, '0');
            counter.innerText = `${current} / ${total}`;
            
            // Update URL so you can share links to specific slides
            window.location.hash = currentIndex + 1;
        }

        function nextSlide() {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                updateSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
            }
        }

        // KEYBOARD SUPPORT
        const handleKeydown = (e) => {
            if (e.key === "ArrowRight" || e.key === " ") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        };

        // Listen on parent window
        document.addEventListener('keydown', handleKeydown);

        // Listen inside iframe (Fixes focus issue)
        viewer.onload = function() {
            try {
                viewer.contentWindow.document.addEventListener('keydown', handleKeydown);
            } catch (e) {
                console.error("If slides are on a different domain, keyboard won't work. On GitHub Pages, this will work fine.");
            }
        };

        // Initialize from URL Hash (e.g. index.html#5)
        const hash = parseInt(window.location.hash.substring(1));
        if (hash && hash <= slides.length) {
            currentIndex = hash - 1;
        }
        
        updateSlide();
    </script>
</body>
</html>
